<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Pixomerck</title>
        <link rel="stylesheet" href="/assets/styles.css?v=0.1.2" />
    </head>
    <body>
        <main class="shell">
            <header class="topbar">
                <div>
                    <h1>Pixomerck</h1>
                    <p id="healthText">Checking server</p>
                </div>
                <div class="status" id="statusText">Idle</div>
            </header>

            <section class="workspace" aria-label="Pixomerck editor">
                <aside class="panel controls">
                    <label>
                        Invite key
                        <input id="inviteKey" type="password" autocomplete="current-password" />
                    </label>

                    <label>
                        API origin
                        <input id="apiOrigin" type="url" placeholder="same origin" />
                    </label>

                    <label>
                        Prompt presets
                        <select id="promptPreset">
                            <option value="">Custom prompt</option>
                        </select>
                    </label>

                    <label>
                        Prompt
                        <textarea id="prompt" rows="5" placeholder="make my outfit futuristic chrome, cinematic lighting"></textarea>
                    </label>

                    <label>
                        Negative prompt
                        <textarea id="negativePrompt" rows="3">blurred face, distorted hands, low quality, extra fingers</textarea>
                    </label>

                    <div class="split">
                        <label>
                            Strength
                            <input id="strength" type="range" min="0.15" max="0.95" step="0.01" value="0.62" />
                        </label>
                        <label>
                            Size
                            <select id="size">
                                <option value="512">512</option>
                                <option value="768">768</option>
                            </select>
                        </label>
                    </div>

                    <button id="generateButton" class="primary" disabled>Generate</button>
                    <p id="nextStepText" class="next-step">Add a prompt and select a photo.</p>
                    <progress id="progress" value="0" max="1"></progress>
                </aside>

                <section class="stage">
                    <div class="toolbar" aria-label="Image source controls">
                        <button id="galleryButton">Select Image</button>
                        <button id="cameraButton">Camera</button>
                        <button id="captureButton" hidden>Capture</button>
                        <button id="toolbarGenerateButton" class="primary toolbar-generate" disabled>Generate</button>
                        <input id="fileInput" type="file" accept="image/*" hidden />
                    </div>

                    <video id="cameraPreview" autoplay playsinline hidden></video>

                    <div class="previews">
                        <figure>
                            <figcaption>Source</figcaption>
                            <canvas id="sourceCanvas"></canvas>
                        </figure>
                        <figure>
                            <figcaption>Person mask</figcaption>
                            <canvas id="maskCanvas"></canvas>
                        </figure>
                        <figure>
                            <figcaption>Result</figcaption>
                            <img id="resultImage" alt="" />
                        </figure>
                    </div>
                </section>
            </section>
        </main>

        <script src="/assets/app.js?v=0.1.2" type="module"></script>
    </body>
</html>
