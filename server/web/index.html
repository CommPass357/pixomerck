<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Pixomerck</title>
        <link rel="stylesheet" href="/assets/styles.css?v=0.1.13" />
    </head>
    <body>
        <section id="authSplash" class="auth-splash" aria-label="Pixomerck login">
            <form id="authForm" class="auth-card">
                <h1>Pixomerck</h1>
                <p>Use your Bored Games account to open the photo generator.</p>

                <label>
                    Email
                    <input id="authEmail" type="email" autocomplete="email" placeholder="you@example.com" required />
                </label>

                <label>
                    Password
                    <input id="authPassword" type="password" autocomplete="current-password" placeholder="Password" required />
                </label>

                <div class="auth-buttons">
                    <button id="authLoginButton" class="primary" type="submit">Log in</button>
                    <button id="authCreateButton" type="button">Create shared account</button>
                </div>

                <p id="authStatus" class="auth-status">Use the same email and password as games.hoesonly.fans.</p>
            </form>
        </section>

        <main id="appShell" class="shell" hidden>
            <header class="topbar">
                <div>
                    <h1>Pixomerck</h1>
                    <p id="healthText">Checking server</p>
                </div>
                <div class="top-actions">
                    <button id="logoutButton" type="button">Log out</button>
                    <div class="status" id="statusText">Idle</div>
                </div>
            </header>

            <section class="workspace" aria-label="Pixomerck editor">
                <aside class="panel controls">
                    <label>
                        API origin
                        <input id="apiOrigin" type="url" placeholder="same origin" />
                    </label>

                    <fieldset class="prompt-builder">
                        <legend>Prompt builder</legend>

                        <label>
                            Concept
                            <select id="promptPreset">
                                <option value="">Custom concept</option>
                            </select>
                        </label>

                        <label>
                            Body / details
                            <select id="bodyPreset">
                                <option value="">No body modifier</option>
                            </select>
                        </label>

                        <label>
                            Background
                            <select id="backgroundPreset">
                                <option value="">No background modifier</option>
                            </select>
                        </label>

                        <label>
                            Items / props
                            <select id="itemPreset">
                                <option value="">No item modifier</option>
                            </select>
                        </label>

                        <label>
                            Environment / style
                            <select id="environmentPreset">
                                <option value="">No style modifier</option>
                            </select>
                        </label>
                    </fieldset>

                    <label>
                        Prompt
                        <textarea id="prompt" rows="5" placeholder="make my outfit futuristic chrome, cinematic lighting"></textarea>
                    </label>

                    <label>
                        Negative prompt
                        <textarea id="negativePrompt" rows="3">blurred face, distorted hands, warped fingers, melted held objects, gray silhouette, low quality, extra fingers</textarea>
                    </label>

                    <div class="split">
                        <label>
                            Strength
                            <input id="strength" type="range" min="0.15" max="0.95" step="0.01" value="0.48" />
                        </label>
                        <label>
                            Size
                            <select id="size">
                                <option value="512">512</option>
                                <option value="768">768</option>
                            </select>
                        </label>
                    </div>

                    <button id="generateButton" class="primary" disabled>Generate</button>
                    <p id="nextStepText" class="next-step">Add a prompt and select a photo.</p>
                    <progress id="progress" value="0" max="1"></progress>
                </aside>

                <section class="stage">
                    <div class="toolbar" aria-label="Image source controls">
                        <button id="galleryButton">Select Image</button>
                        <button id="cameraButton">Camera</button>
                        <button id="captureButton" hidden>Capture</button>
                        <button id="toolbarGenerateButton" class="primary toolbar-generate" disabled>Generate</button>
                        <input id="fileInput" type="file" accept="image/*" hidden />
                    </div>

                    <video id="cameraPreview" autoplay playsinline hidden></video>

                    <div class="previews">
                        <figure>
                            <figcaption>Source</figcaption>
                            <canvas id="sourceCanvas"></canvas>
                        </figure>
                        <figure>
                            <figcaption>Person mask</figcaption>
                            <canvas id="maskCanvas"></canvas>
                        </figure>
                        <figure>
                            <figcaption>Result</figcaption>
                            <img id="resultImage" alt="" />
                        </figure>
                    </div>
                </section>
            </section>
        </main>

        <script src="/assets/app.js?v=0.1.13" type="module"></script>
    </body>
</html>
